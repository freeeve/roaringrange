sonar.projectKey=freeeve_roaringrange
sonar.organization=freeeve

# Generated / vendored artifacts — not our source, don't analyze.
# roaringrange_reader.js is wasm-pack (wasm-bindgen) output committed so the
# OpenAlex demo runs as-is; the .wasm is binary; SVGs are diagrams.
sonar.exclusions=examples/openalex/web/roaringrange_reader.js,**/*.wasm,**/*.svg

# Go test files shouldn't count against duplication/complexity of the library.
sonar.test.inclusions=**/*_test.go
