name: Release (PyPI)

# Build the Python extension wheels for every platform and publish them to PyPI
# on a version tag. The crate builds an abi3 wheel (one per platform, good for
# CPython 3.8+), so there is no per-Python-version matrix here — only a
# per-platform/arch one.
#
# abi3 targets the GIL stable ABI (Limited API): these wheels do NOT support
# free-threaded CPython (3.13t / 3.14t), which has no stable ABI — maturin/pyo3
# cannot build or install abi3 there. The build below pins a standard (GIL) 3.12
# interpreter so the abi3 build is deterministic on Windows/macOS (the runner's
# default Python must never be a free-threaded one). Free-threaded support would
# need dropping abi3 for non-abi3, per-version wheels (`-i python3.13t`, …).
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token. One-time setup
# on PyPI: create the `roaringrange` project's trusted publisher pointing at this
# repo + workflow (`release.yml`) + environment `pypi`. Tag a release to ship:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Note: only wheels are published (no sdist). The Python crate depends on the
# core Rust crate by a local path (`../rust`), which cannot be packaged into a
# buildable sdist; publish the core crate to crates.io first if an sdist is
# wanted later.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-latest, target: aarch64, manylinux: auto }
          # Both macOS arches build on the Apple-Silicon runner: the x86_64 wheel is
          # cross-compiled (maturin-action adds the x86_64-apple-darwin target). The
          # retired macos-13 Intel runner is avoided — it starved the queue for hours
          # and blocked the whole release (publish needs every wheel leg to finish).
          - { runner: macos-14, target: x86_64, manylinux: '' }
          - { runner: macos-14, target: aarch64, manylinux: '' }
          - { runner: windows-latest, target: x64, manylinux: '' }
    steps:
      - uses: actions/checkout@v5
      # Pin a standard (GIL) interpreter for the native macOS/Windows abi3 build
      # so it never picks up a free-threaded default. Ignored by the Linux
      # manylinux container build (which builds abi3 with its own interpreter).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Track the git tag: derive the wheel version from the tag (v1.2.3 -> 1.2.3)
      # so the PyPI version always matches the release tag — no manual pyproject
      # bump, no drift. Cross-OS via the resident Python. Tag pushes only; a
      # workflow_dispatch run keeps pyproject's static version.
      - name: Version the wheel from the tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          python -c "import os,re,pathlib; v=os.environ['GITHUB_REF_NAME'].removeprefix('v'); p=pathlib.Path('python/pyproject.toml'); p.write_text(re.sub(r'(?m)^version = \".*?\"', f'version = \"{v}\"', p.read_text(), count=1))"
          grep '^version' python/pyproject.toml
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux }}
          sccache: 'true'
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/roaringrange
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
